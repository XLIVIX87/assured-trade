name: assured-trade

services:
  db:
    image: postgres:16-alpine
    container_name: assuredtrade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-assuredtrade}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-assuredtrade}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - assuredtrade-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-assuredtrade}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NODE_ENV=production
    container_name: assuredtrade-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-assuredtrade}:${DB_PASSWORD}@db:5432/${DB_NAME:-assuredtrade}?schema=public
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  assuredtrade-pgdata:

networks:
  internal:
    driver: bridge
