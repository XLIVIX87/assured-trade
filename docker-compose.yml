name: assured-trade

services:
  db:
    image: postgres:16-alpine
    container_name: assuredtrade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: assuredtrade
      POSTGRES_PASSWORD: assuredtrade_dev
      POSTGRES_DB: assuredtrade
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - assuredtrade-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assuredtrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: assuredtrade-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://assuredtrade:assuredtrade_dev@db:5432/assuredtrade?schema=public
      AUTH_SECRET: dev-secret-change-me-in-production
      AUTH_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  assuredtrade-pgdata:
