services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ukcg
      POSTGRES_PASSWORD: ukcg_dev_password
      POSTGRES_DB: ukcg
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukcg"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://ukcg:ukcg_dev_password@db:5432/ukcg?schema=public
      AUTH_SECRET: dev-secret-change-me-in-production
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
